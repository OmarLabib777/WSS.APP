<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WSS">
<meta name="theme-color" content="#0A1628">
<title>Wilhelmsen Ships Service</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.6.0/dist/tabler-icons.min.css">
<style>
:root{
  /* Brand colours */
  --wblue:#005DAA;--wblue2:#003F7A;--wblue3:#E6F1FA;
  --wred:#C8102E;--wred2:#FDEAED;
  --wnavy:#003057;--wnavy2:#E8EEF8;
  --wamber:#B8860B;--wamber2:#FFF8E1;
  --wgreen:#155D32;--wgreen2:#E8F5E9;
  /* Light theme surfaces */
  --bg:#F4F7FB;--bg2:#FFFFFF;--bg3:#EEF2F8;--bg4:#E3EAF4;
  --card:#FFFFFF;--card2:#F8FAFD;
  --border:rgba(0,93,170,.1);--border2:rgba(0,93,170,.18);
  /* Text */
  --text:#0D1B2E;--text2:#3A5070;--text3:#7A95B0;
  /* Accent */
  --accent:#005DAA;--accent2:#003F7A;--accent-bg:#E6F1FA;
  --red:#C8102E;--red-bg:#FDEAED;
  --green:#155D32;--green-bg:#E8F5E9;
  --amber:#B8860B;--amber-bg:#FFF8E1;
  --amber-light:#FFF3CC;
  --navy:#003057;--navy-bg:#E8EEF8;
  --teal:#0077A8;--teal-bg:#E0F4FC;
  --r6:6px;--r10:10px;--r14:14px;--r20:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#D6E4F0;font-family:Inter,sans-serif;overflow:hidden;color:var(--text)}
#app{max-width:430px;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column}
input,button,select{font-family:Inter,sans-serif;-webkit-appearance:none}
::-webkit-scrollbar{display:none}
/* NAV BAR */
.nav{background:var(--accent);flex-shrink:0}
.nt{display:flex;align-items:center;padding:10px 14px 10px}
.logo-mark{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:8px;display:grid;place-items:center;flex-shrink:0}
.logo-mark svg{width:18px;height:18px}
.logo-text{margin-left:10px}
.logo-text .t1{font-size:13px;font-weight:700;color:#fff;letter-spacing:.01em}
.logo-text .t2{font-size:10px;color:rgba(255,255,255,.65);letter-spacing:.05em;text-transform:uppercase;margin-top:1px}
.brand-pills{margin-left:auto;display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;max-width:200px}
.bpill{font-size:8.5px;font-weight:800;letter-spacing:.04em;padding:3px 7px;border-radius:4px;text-transform:uppercase;border:1px solid;white-space:nowrap}

.seg{display:flex;padding:4px 8px 8px;gap:2px;overflow-x:auto}
.seg::-webkit-scrollbar{display:none}
.sb{flex-shrink:0;padding:6px 10px;border-radius:var(--r6);border:none;background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:10px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.sb i{font-size:13px}
.sb.on{background:#fff;color:var(--accent);font-weight:700}
.sb.on i{color:var(--accent)}

/* PAGES */
.pw{flex:1;position:relative;overflow:hidden}
.pg{position:absolute;inset:0;overflow-y:auto;background:var(--bg);transition:transform .26s cubic-bezier(.4,0,.2,1)}
.pg.active{transform:translateX(0)}
.pg.left{transform:translateX(-100%)}
.pg.right{transform:translateX(100%)}

/* SECTION HEADER */
.shdr{background:var(--bg2);padding:12px 16px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;backdrop-filter:blur(12px)}
.sbk{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--accent);cursor:pointer;background:none;border:none;padding:0;margin-bottom:10px}
.str{display:flex;align-items:center;gap:10px}
.sico{width:36px;height:36px;border-radius:var(--r10);display:grid;place-items:center;flex-shrink:0}
.snm{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.sds{font-size:11px;color:var(--text3);margin-top:2px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r14);margin-bottom:8px;box-shadow:0 1px 3px rgba(0,93,170,.06)}
.stit{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.icard{background:var(--accent-bg);border:1px solid rgba(0,93,170,.15);border-radius:var(--r10);padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--accent2);line-height:1.6}

/* PRODUCT ROWS */
.pr{display:flex;align-items:center;gap:10px;padding:11px 14px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s}
.pr:active{background:var(--bg4)}
.pr:first-child{border-top:none}
.pico{width:32px;height:32px;border-radius:var(--r6);display:grid;place-items:center;flex-shrink:0}
.pn{font-size:13px;font-weight:500;color:var(--text);line-height:1.2}
.pm{display:flex;align-items:center;gap:4px;margin-top:3px;flex-wrap:wrap}
.pno{font-family:monospace;font-size:9px;color:var(--text3);background:var(--bg4);padding:1px 4px;border-radius:3px}
.bdg{font-size:8px;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.b-u{background:var(--red-bg);color:var(--red)}
.b-n{background:var(--navy-bg);color:#6B9FE4}
.b-nd{background:var(--navy-bg);color:#7B9FD4}
.b-must{background:var(--green-bg);color:var(--green)}
.b-gth{background:var(--amber-bg);color:var(--amber)}
.b-opt{background:var(--bg4);color:var(--text3)}

/* WIZARD BUTTONS */
.wbtn{width:100%;padding:10px 12px;border-radius:var(--r10);background:var(--card);border:1px solid var(--border2);color:var(--text2);font-size:12px;font-weight:500;text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .15s;box-shadow:0 1px 2px rgba(0,93,170,.05)}
.wbtn:hover{border-color:var(--accent);color:var(--accent)}
.wbtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(0,93,170,.2)}
.wbtn .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.4}
.wbtn.on .dot{opacity:1}

/* ACCORDION */
.cww{border:1px solid var(--border);border-radius:var(--r14);overflow:hidden;margin-bottom:8px}
.cwh{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--card);cursor:pointer;transition:background .1s}
.cwh:active{background:var(--card2)}
.cwh.on{background:var(--accent)}
.cwt{font-weight:600;font-size:13px;color:var(--text)}
.cwh.on .cwt{color:#fff}
.cwtg{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.cwb{background:var(--bg3);border-top:1px solid var(--border)}
.dlbl{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:10px 14px 4px}
.tip{margin:6px 14px 10px;padding:9px 12px;border-left:2px solid var(--accent);background:var(--accent-bg);font-size:11px;color:#7BB8F8;line-height:1.5;border-radius:0 6px 6px 0}

/* CATEGORY CARDS */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:var(--r14);padding:13px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;box-shadow:0 1px 3px rgba(0,93,170,.06)}
.ccard:hover{border-color:var(--border2);box-shadow:0 2px 6px rgba(0,93,170,.1)}
.ccard:active{background:var(--accent-bg)}

/* HOME GRID */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 14px 4px}
.dvc{background:var(--card);border:1px solid var(--border);border-radius:var(--r14);padding:14px 12px 30px;cursor:pointer;position:relative;overflow:hidden;transition:all .15s;box-shadow:0 1px 3px rgba(0,93,170,.06)}
.dvc:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,93,170,.1)}
.dvc:active{background:var(--accent-bg)}
.dvc-icon{width:36px;height:36px;border-radius:var(--r10);display:grid;place-items:center;margin-bottom:10px}
.dvc-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.dvc-sub{font-size:10px;color:var(--text3);line-height:1.4}
.dvc-arrow{position:absolute;bottom:10px;right:10px;font-size:14px;color:var(--text3)}

/* DETAIL HEADER */
.dhdr{padding:16px 16px 0;position:sticky;top:0;z-index:5}
.dbk{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:rgba(255,255,255,.7);cursor:pointer;background:none;border:none;padding:0;margin-bottom:12px}
.dnm{font-size:20px;font-weight:700;color:#fff;line-height:1.15;margin-bottom:12px}
.dtabs{display:flex;background:rgba(0,0,0,.2);border-radius:var(--r10);padding:3px;gap:2px}
.dtab{flex:1;padding:7px 4px;border-radius:8px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:10px;font-weight:500;cursor:pointer;transition:all .15s}
.dtab.on{background:rgba(255,255,255,.15);color:#fff;font-weight:600}

/* DETAIL BODY */
.dbody{padding:12px 14px}
.dcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r14);padding:14px;margin-bottom:10px}
.dl{font-size:9px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.dt{font-size:12px;color:var(--text2);line-height:1.65}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fi{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r6);padding:7px 9px;font-size:11px;color:var(--text2);display:flex;align-items:flex-start;gap:5px;line-height:1.4}
.fid{width:4px;height:4px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.stbl{width:100%;border-collapse:collapse}
.stbl tr{border-top:1px solid var(--border)}
.stbl tr:first-child{border-top:none}
.stbl td{padding:8px 0;font-size:12px;vertical-align:top}
.stbl td:first-child{color:var(--text3);width:46%;padding-right:8px}
.stbl td:last-child{font-weight:500;color:var(--text);text-align:right}
.dbox{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r10);padding:12px;font-size:12px;color:var(--text2);line-height:1.65}
.kbox{background:var(--green-bg);border:1px solid rgba(34,197,94,.2);border-radius:var(--r10);padding:10px 12px;font-size:12px;font-weight:500;color:var(--green);display:flex;align-items:flex-start;gap:8px}
.wbox{background:var(--amber-bg);border:1px solid rgba(245,158,11,.2);border-radius:var(--r10);padding:10px 12px;font-size:12px;color:var(--amber);line-height:1.55}
.obtn{display:block;width:100%;margin-top:2px;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r10);font-size:13px;font-weight:600;text-align:center;cursor:pointer;letter-spacing:.01em}

/* RESULT BAR */
.rbar{border-radius:var(--r14) var(--r14) 0 0;padding:12px 14px}
.ppill{font-size:10px;font-weight:800;letter-spacing:.05em;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.25);color:#fff;display:inline-block}
.rstb{font-size:11px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;cursor:pointer}

/* SEARCH */
.sw{background:var(--card);border:1px solid var(--border2);border-radius:var(--r10);padding:0 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 3px rgba(0,93,170,.06)}
.sw input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--text);height:40px;font-weight:500}
.sw input::placeholder{color:var(--text3)}
.fr{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;margin-bottom:4px}
.fp{white-space:nowrap;padding:5px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid var(--border2);background:var(--card);color:var(--text3);cursor:pointer}
.fp.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.rc{font-size:11px;color:var(--text3);margin-bottom:5px}

/* SDML */
.sdml-green{background:#0B3320;border:1px solid rgba(34,197,94,.25);border-radius:var(--r10);padding:10px 12px;font-size:12px;color:#4ADE80;line-height:1.5}
.sdml-amber{background:var(--amber-bg);border:1px solid rgba(245,158,11,.2);border-radius:var(--r10);padding:10px 12px;font-size:12px;color:var(--amber);line-height:1.5}
.metric-box{border-radius:var(--r10);padding:10px 12px}

/* KL ENV BOXES */
.eal-box{background:#0A2E1A;border:1px solid rgba(34,197,94,.2);border-radius:var(--r10);padding:11px;font-size:12px;color:#4ADE80;line-height:1.55;margin-bottom:10px}
.min-box{background:#1F1508;border:1px solid rgba(245,158,11,.2);border-radius:var(--r10);padding:11px;font-size:12px;color:var(--amber);line-height:1.55;margin-bottom:10px}

/* ── AI CHAT ─────────────────────────────────────────────────────────────── */
.chat-wrap{display:flex;flex-direction:column;height:100%}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 12px 8px}
.chat-input-bar{padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.chat-input-row{display:flex;align-items:flex-end;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:8px 10px 8px 14px}
.chat-input-row textarea{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:13px;resize:none;max-height:80px;min-height:20px;line-height:1.5;font-family:Inter,sans-serif}
.chat-input-row textarea::placeholder{color:var(--text3)}
.send-btn{width:32px;height:32px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:grid;place-items:center;flex-shrink:0;transition:background .15s}
.send-btn:disabled{background:var(--bg4);cursor:default}
.send-btn i{font-size:15px;color:#fff}
.msg{margin-bottom:12px;max-width:88%}
.msg-user{margin-left:auto;text-align:right}
.msg-bubble{display:inline-block;padding:9px 13px;border-radius:16px;font-size:13px;line-height:1.55}
.msg-user .msg-bubble{background:var(--accent);color:#fff;border-radius:16px 16px 4px 16px}
.msg-ai .msg-bubble{background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:16px 16px 16px 4px}
.msg-ai .msg-bubble strong{color:var(--text)}
.msg-time{font-size:10px;color:var(--text3);margin-top:4px;padding:0 4px}
.prod-chip{display:inline-flex;align-items:center;gap:5px;background:var(--accent-bg);border:1px solid rgba(46,138,246,.25);border-radius:8px;padding:5px 10px;cursor:pointer;margin:3px 3px 3px 0;font-size:11px;font-weight:600;color:var(--accent);transition:background .1s}
.prod-chip:hover{background:rgba(46,138,246,.2)}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);display:inline-block;animation:typingBounce 1.2s infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.suggest-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 10px}
.suggest-chip{padding:6px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--text2);cursor:pointer;font-weight:500;transition:all .15s}
.suggest-chip:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div id="app">
<div class="nav">
  <div class="nt">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9,22 9,12 15,12 15,22"/>
      </svg>
    </div>
    <div class="logo-text">
      <div class="t1">Wilhelmsen</div>
      <div class="t2">Ships Service</div>
    </div>
    <div class="brand-pills">
      <span class="bpill" style="background:#C8102E;color:#fff;border-color:#9E0D23">UNITOR</span>
      <span class="bpill" style="background:#003057;color:#fff;border-color:#001830">NALFLEET</span>
      <span class="bpill" style="background:#2D4A8A;color:#fff;border-color:#1C2F5E">NAVADAN</span>
      <span class="bpill" style="background:#B8860B;color:#fff;border-color:#8A6408">KLÜBER</span>
      <span class="bpill" style="background:#155D32;color:#fff;border-color:#0D3D21">TIMM</span>
      <span class="bpill" style="background:rgba(255,255,255,.25);color:#fff;border-color:rgba(255,255,255,.5)">UNICOOL</span>
    </div>
  </div>
  <div class="seg">
    <button class="sb on" id="sn-home" onclick="goHome()"><i class="ti ti-home" aria-hidden="true"></i>Home</button>
    <button class="sb" id="sn-products" onclick="goSeg('products')"><i class="ti ti-package" aria-hidden="true"></i>Products</button>
    <button class="sb" id="sn-wsr" onclick="goSeg('wsr')"><i class="ti ti-clipboard-text" aria-hidden="true"></i>Water Service</button>
    <button class="sb" id="sn-myreports" onclick="goSeg('myreports')"><i class="ti ti-files" aria-hidden="true"></i>My Reports</button>
    <button class="sb" id="sn-sr" onclick="goSeg('sr')"><i class="ti ti-search" aria-hidden="true"></i>Search</button>
  </div>
</div>
<div class="pw" id="pw"></div>
</div>

// ── ENGINE ─────────────────────────────────────────────────────────────────────
let stk=[], bpr=null, oc=null, sac='All', svt=null, sri=null;
const pw = document.getElementById('pw');

function rp(id, html, dir='right') {
  // Store html in stack so goBack can always re-render the previous page
  const entry = stk[stk.length-1];
  if(entry && typeof entry === 'object' && entry.id === id) entry.html = html;
  const old = pw.querySelector('.pg.active');
  const np = Object.assign(document.createElement('div'), {className:'pg right', id:'pg-'+id, innerHTML:html});
  pw.appendChild(np);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(old){old.classList.remove('active');old.classList.add(dir==='right'?'left':'right');}
    np.classList.remove('right','left'); np.classList.add('active'); np.scrollTop=0;
  }));
  setTimeout(()=>{if(old&&old!==np)old.remove();}, 350);
}
function push(id, fn) { const html = fn(); stk.push({id, html}); rp(id, html); }
function goBack() {
  stk.pop();
  const prev = stk[stk.length-1];
  if(!prev) { goHome(); return; }
  const id   = typeof prev==='object' ? prev.id   : prev;
  const html = typeof prev==='object' ? prev.html : null;
  if(html) {
    rp(id, html, 'left');
  } else {
    const fns = {home:hHome,wt:hWT,cl:hCL,fl:hFuel,wld:hWelding,gas:hGases,nv:hNV,nbi:hNBI,kl:hKluber,rp:hRopes,ref:hRefrig,wsr:hWSR,products:hProducts,myreports:hMyReports,ai:hAI,sr:hSrch};
    rp(id, (fns[id]||hHome)(), 'left');
  }
}
function sseg(id) { ['home','wt','cl','fl','wld','gas','ref','kl','rp','nv','nbi','wsr','products','myreports','ai','sr'].forEach(s=>{const el=document.getElementById('sn-'+s);if(el)el.classList.toggle('on',s===id);}); }
function goHome() { sseg('home'); stk=[{id:'home',html:null}]; rp('home', hHome(), 'left'); }
function goSeg(s) { sseg(s); const fn={wt:hWT,cl:hCL,fl:hFuel,wld:hWelding,gas:hGases,nv:hNV,nbi:hNBI,kl:hKluber,rp:hRopes,ref:hRefrig,wsr:hWSR,products:hProducts,myreports:hMyReports,ai:hAI,sr:hSrch}[s]; const html=fn?fn():null; stk=[{id:s,html}]; if(html)rp(s,html); }
function prB(pr) { const l=pr.toLowerCase(); return `<span class="bdg ${l.includes('must')?'b-must':l.includes('good')?'b-gth':'b-opt'}">${pr}</span>`; }
function bb(b) { return b==='UNITOR'?'b-u':b==='NALFLEET'?'b-n':'b-nd'; }

// ── KLDB LOOKUP ───────────────────────────────────────────────────────────────
const KLDB = {};
function buildKLDB() {
  if(Object.keys(KLDB).length) return;
  Object.keys(KAPP).forEach(appId => {
    const a = KAPP[appId];
    a.pts.forEach(pt => {
      pt.subs.forEach(s => {
        s.prods.forEach(pr => {
          const key = pr.n.replace(/[^a-zA-Z0-9]/g, '_');
          KLDB[key] = pr;
        });
      });
    });
  });
}

  // Try exact key match first, then find by p field
  let key=p, d=DB[p];

      <i class="ti ti-chevron-right" style="font-size:12px;color:var(--text3);flex-shrink:0" aria-hidden="true"></i>

    </div>`;
  }

  // Standard chemical section
  const prods = allEntries.filter(([k,v])=>cats.includes(v.cat));
  const rows = prods.map(([k,p])=>`<div class="pr" onclick="${p.p&&p.p!==''?`det('${p.p}')`:`detByKey('${k}')`}">
    <div class="pico" style="background:${bg}"><i class="ti ti-spray" style="font-size:13px;color:${col}" aria-hidden="true"></i></div>

    <i class="ti ti-chevron-right" style="font-size:12px;color:var(--text3);flex-shrink:0" aria-hidden="true"></i>
  </div>`).join('');

  return header + `<div class="dbody">
    <div class="card" style="padding:2px 0">${rows}</div>
  </div>`;
}

function hFuelSub(id){
  const sec = FL_SECTIONS.find(s=>s.id===id);

  rp(id, _fs);

function buildFuelSubPage(sec){
  const col = sec.col, bg = sec.bg, label = sec.label, cats = sec.cats;
  const allEntries = Object.entries(DB);
  const prods = allEntries.filter(([k,v])=>cats.includes(v.cat));
  const isEquip = cats.includes('Fuel Equipment');
  const icon = isEquip ? 'ti-settings-2' : cats.includes('Fuel Test Kits') ? 'ti-flask' : 'ti-droplet';
  const rows = prods.map(([k,p])=>`<div class="pr" onclick="${p.p&&p.p!==''?`det('${p.p}')`:`detByKey('${k}')`}">
    <div class="pico" style="background:${bg}"><i class="ti ${icon}" style="font-size:13px;color:${col}" aria-hidden="true"></i></div>
    <div style="flex:1;min-width:0"><div class="pn">${p.name}</div>

      </div>

function nvQtySwitch(id, vk) {
  const item = CARGO_DB.find(c=>c.id===id); if(!item)return;
  const pc = PROC_COLORS[item.proc]||'#2D4A8A';
  const pb = PROC_BG[item.proc]||'#E8EEF8';
  // Update tab styles
  ['handymax','supramax','panamax'].forEach(v=>{
    const b = document.getElementById('nvqt-'+id+'-'+v);
    if(!b) return;
    const on = v===vk;
    b.style.background = on?pc:'#fff';
    b.style.color = on?'#fff':'var(--text2)';
    b.style.borderColor = on?pc:'rgba(45,74,138,.2)';
  });
  const box = document.getElementById('nvqty-'+id);
  if(box) box.innerHTML = nvQtyBlock(item, vk, pc, pb);
}

  </div>`;

function resolveProduct(p) {
  // Returns {hasDetail, onclick, icon} based on product category and id
  if(p.c==='Refrigerant') {
    const key = p.n.replace('Unicool ','').replace(' CO2','');
    const r = REFRIG_DB[key];
    if(r) return {has:true, click:`refrigDet('${key}')`};
  }
  if(p.c==='Refrig Equipment') {
    const keyMap = {
      '613927':'recovery-110v','652522':'recovery-220v',
      '716142':'leak-detector','711473':'digi-manifold'
    };
    const slugMap = {
      'UV Tracer Kit':'uv-tracer',
      'Refrigerant Leak Monitor Kit 6CH Samon':'samon-monitor',
      'Refrigeration Handy Tool Case':'tool-case'
    };
    const key = keyMap[p.p] || slugMap[p.n];
    if(key && EQUIP_DB[key]) return {has:true, click:`equipDet('${key}')`};
  }
  if(p.c==='Ropes') {
    const idMap = {
      'Timm Master SBA':'TM-SBA','Timm Master 8':'TM8',
      'Acera Amundsen SBA':'ACERA-AM','Acera daGama SBA':'ACERA-DG',
      'Timm Master 8 Tail':'TAIL-M8','Timm Master 12 SBA Tail':'TAIL-SBA',
      'Timm Chafe Guard':'CG-STD','Timm Chafe Guard Pro':'CG-PRO'
    };
    const rid = idMap[p.n];
    if(rid) return {has:true, click:`ropeDet('${rid}')`};
  }
  if(p.c==='Lubricant') {
    buildKLDB();
    const key = p.n.replace(/[^a-zA-Z0-9]/g,'_');
    if(KLDB[key]) return {has:true, click:`klDetByKey('${key}')`};
  }
  // Welding and Gas products
  const weldCats = ['Cleaning Equipment','Navadan Equipment','Welding Machine','Electrodes','Electrode Storage','TIG Accessories','Welding Wire','TIG Consumables','Gas Welding','Gas Equipment','Welding Accessories','Gas'];
  if(weldCats.includes(p.c)) {
    // Find key by part number or name match
    const keyByP = Object.keys(WELD_DB).find(k=>WELD_DB[k].p===p.p && p.p!=='');
    const keyByN = Object.keys(WELD_DB).find(k=>WELD_DB[k].n===p.n || p.n.includes(WELD_DB[k].n.substring(0,20)));
    const key = keyByP || keyByN;
    if(key) return {has:true, click:`weldDet('${key}')`};
  }
  // Check DB by part number
  if(p.p && DB[p.p]) return {has:true, click:`det('${p.p}')`};
  // Check DB by key lookup (for string-keyed entries with no p number)
  const dbKey = Object.keys(DB).find(k => DB[k].n === p.n || DB[k].p === p.p);
  if(dbKey) return {has:true, click:`detByKey('${dbKey}')`};
  return {has:false, click:''};
}

function sRows(list){
  if(!list.length)return'<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">No products found</div>';
  return list.map(p=>{

// Build compact product catalogue context for the AI
function buildCatalogueContext() {
  const lines = [];
  lines.push('WILHELMSEN SHIPS SERVICE  -  PRODUCT CATALOGUE CONTEXT');
  lines.push('You are an expert product selector for Wilhelmsen Ships Service. Help users find the right marine product.');
  lines.push('');
  lines.push('== CHEMICALS (DB) ==');
  Object.values(DB).forEach(p => {
    lines.push(`${p.name} (#${p.p}) [${p.brand}] [${p.cat}]  -  ${p.desc.substring(0,120)}`);
  });
  lines.push('');
  lines.push('== BOILER PROGRAMS ==');
  lines.push('Program A: LP/MP up to 31 BarG, distilled. Program D: LP/MP, non-distilled. Program B: MP 31-42 BarG. Program C: HP above 42 BarG.');
  lines.push('');
  lines.push('== COOLING PROGRAMS ==');
  CWD.forEach(p => lines.push(`${p.name}: ${p.type}, ${p.al}`));
  lines.push('');
  lines.push('== KLUBER LUBRICANTS (application-oriented) ==');
  Object.keys(KAPP).forEach(k => {
    const a = KAPP[k];
    lines.push(`Application: ${a.label}`);
    a.pts.forEach(pt => {
      pt.subs.forEach(s => {
        s.prods.forEach(pr => {
          lines.push(`  - ${pr.n} [${pr.iso}] [${pr.cat.toUpperCase()}]  -  ${(pr.desc||'').substring(0,100)}`);
        });
      });
    });
  });
  lines.push('');
  lines.push('== TIMM ROPES ==');
  ROPES.forEach(r => lines.push(`${r.name} [${r.brand}] [${r.type}]  -  ${r.desc.substring(0,100)}`));
  lines.push('');
  lines.push('== NAVADAN ==');
  NVS.forEach(s => s.prods.forEach(id => {
    const p = DB[id]; if(p) lines.push(`${p.name} (#${p.p}) [${p.cat}]  -  ${p.desc.substring(0,100)}`);
  }));
  lines.push('');
  lines.push('RESPONSE RULES:');
  lines.push('- Be concise and practical. Max 3-4 sentences per answer unless listing products.');
  lines.push('- When recommending products, format as: **Product Name** (#partnumber)  -  reason');
  lines.push('- For boiler water: ask pressure range and feedwater type if not given.');
  lines.push('- For thrusters/stern tube: always recommend EAL (Kluberbio) for VGP compliance.');
  lines.push('- For wire ropes near water: recommend EAL greases (AG 39-602 or AM 92-142).');
  lines.push('- SDMBL/rope sizing: ask vessel type and DWT. LDBF = 100-105% SDMBL. TDBF = 125-130% SDMBL.');
  lines.push('- Keep answers actionable. End with a specific recommendation when possible.');
  return lines.join('\n');
}

// Parse AI response and make product names clickable
function parseAIResponse(text) {
  // Bold text
  let html = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // Line breaks
  html = html.replace(/\n\n/g, '</p><p style="margin-top:8px">').replace(/\n/g, '<br>');
  // Wrap in paragraph
  html = '<p>' + html + '</p>';
  
  // Find product part numbers and make them chips
  const chips = [];
  const matched = new Set();
  Object.values(DB).forEach(p => {
    if(text.includes('#'+p.p) && !matched.has(p.p)) {
      matched.add(p.p);
      chips.push({p:p.p, n:p.name});
    }
  });
  
  if(chips.length) {
    html += '<div style="margin-top:8px">' + chips.map(({p,n})=>`<span class="prod-chip" onclick="det('${p}')"><i class="ti ti-arrow-right" style="font-size:10px"></i>${n}</span>`).join('') + '</div>';
  }
  return html;
}

let chatTyping = false;

    <div class="str">
      <div class="sico" style="background:var(--accent-bg)"><i class="ti ti-sparkles" style="font-size:17px;color:var(--accent)" aria-hidden="true"></i></div>
      <div><div class="snm">Chatbot</div><div class="sds">AI-powered product selector</div></div>
      ${chatHistory.length>0?`<button onclick="clearChat()" style="margin-left:auto;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;color:var(--text3);font-size:11px;font-weight:500;padding:5px 10px;cursor:pointer">Clear</button>`:''}
    </div>
  </div>
  <div style="display:flex;flex-direction:column;height:calc(100% - 69px)">
    <div id="chat-msgs" style="flex:1;overflow-y:auto;padding:10px 12px 4px">
      ${msgs}
      ${chatHistory.length===0?`<div class="suggest-chips" id="suggest-chips">
        ${suggestions.map(s=>`<div class="suggest-chip" onclick="sendSuggest(this.textContent)">${s}</div>`).join('')}
      </div>`:''}
    </div>
    <div style="padding:10px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0">
      <div class="chat-input-row">
        <textarea id="chat-input" placeholder="Ask about any product..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendChat()"><i class="ti ti-send" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>`;
}

function renderMsg(m) {
  const isUser = m.role === 'user';
  return `<div class="msg ${isUser?'msg-user':'msg-ai'}">
    ${!isUser?`<div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:4px;letter-spacing:.04em">WSS ASSISTANT</div>`:''}
    <div class="msg-bubble">${isUser ? m.content.replace(/</g,'&lt;') : parseAIResponse(m.content)}</div>
  </div>`;
}

function sendSuggest(text) {
  const input = document.getElementById('chat-input');
  if(input) input.value = text;
  sendChat();
}

async function sendChat() {
  if(chatTyping) return;
  const input = document.getElementById('chat-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  
  input.value = '';
  input.style.height = 'auto';
  
  // Add user message
  chatHistory.push({role:'user', content:text});
  
  // Re-render with typing indicator
  chatTyping = true;
  refreshChat(true);
  
  const btn = document.getElementById('send-btn');
  if(btn) btn.disabled = true;
  
  try {
    const catalogueCtx = buildCatalogueContext();
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: catalogueCtx,
        messages: chatHistory.slice(-10).map(m => ({role:m.role, content:m.content}))
      })
    });
    
    const data = await response.json();
    const reply = (data.content && data.content[0] && data.content[0].text) || 'Sorry, I could not get a response. Please try again.';
    chatHistory.push({role:'assistant', content:reply});
  } catch(e) {
    chatHistory.push({role:'assistant', content:'Sorry, there was a connection error. Please check your connection and try again.'});
  }
  
  chatTyping = false;
  refreshChat(false);
  
  const btn2 = document.getElementById('send-btn');
  if(btn2) btn2.disabled = false;
}

function refreshChat(showTyping) {
  const ap = pw.querySelector('.pg.active');
  if(!ap || !ap.id.includes('ai')) {
    // Re-navigate to AI page
    rp('ai', hAI());
    stk = ['ai'];
    return;
  }
  const msgs = document.getElementById('chat-msgs');
  if(!msgs) return;
  msgs.innerHTML = chatHistory.map(m => renderMsg(m)).join('');
  if(showTyping) {
    msgs.innerHTML += `<div class="msg msg-ai">
      <div style="font-size:10px;font-weight:600;color:var(--accent);margin-bottom:4px;letter-spacing:.04em">WSS ASSISTANT</div>
      <div class="msg-bubble" style="padding:10px 14px"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>
    </div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function clearChat() {
  chatHistory = [];
  chatTyping = false;
  rp('ai', hAI());
}

        <span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.15);color:#fff;text-transform:uppercase;border:1px solid rgba(255,255,255,.3)">${r.gwpClass}</span>
        ${r.p?`<span style="font-size:9px;font-family:monospace;color:rgba(255,255,255,.7);background:rgba(0,0,0,.15);padding:2px 6px;border-radius:4px">#${r.p}</span>`:''}

        </div>
        <div style="background:rgba(255,255,255,.18);border-radius:var(--r10);padding:8px 10px;flex:1;text-align:center">
          <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Type</div>
          <div style="font-size:12px;font-weight:700;color:#fff">${r.type}</div>
        </div>
        <div style="background:rgba(255,255,255,.18);border-radius:var(--r10);padding:8px 10px;flex:1;text-align:center">
          <div style="font-size:9px;font-weight:700;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Size</div>
          <div style="font-size:12px;font-weight:700;color:#fff">${r.size}</div>
        </div>
      </div>
      <div style="display:flex;background:rgba(0,0,0,.2);border-radius:var(--r10);padding:3px;gap:2px;margin-bottom:0">

function refrigTab(r, tab) {
  if(tab==='overview') return `
    <div class="dcard"><div class="dl">Description</div><div class="dt">${r.desc}</div></div>
    <div class="dcard"><div class="dl">Key characteristics</div><div class="fg">${r.feats.map(f=>`<div class="fi"><span class="fid" style="background:${r.col}"></span>${f}</div>`).join('')}</div></div>
    ${r.alts.length?`<div class="dcard"><div class="dl">Recommended alternatives</div>
      ${r.alts.map(a=>{const alt=REFRIG_DB[a];if(!alt)return'';return`
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:36px;height:36px;border-radius:8px;background:${alt.bg};display:grid;place-items:center;flex-shrink:0"><span style="font-size:9px;font-weight:800;color:${alt.col};font-family:monospace">${a.replace('R-','')}</span></div>
          <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">${alt.name}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px">GWP ${alt.gwp}  |  ${alt.gwpClass}</div>
          </div>
          <button onclick="refrigDet('${a}')" style="background:var(--accent-bg);color:var(--accent);border:1px solid rgba(0,93,170,.2);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer">View</button>
        </div>`;}).join('')}
    </div>`:''}
    ${r.note?`<div class="dcard"><div class="dl">Selection note</div><div class="dbox">${r.note}</div></div>`:''}
    <button class="obtn" onclick="window.open('https://www.wilhelmsen.com/product-catalogue/products/gases-refrigerants-and-cylinders/refrigerants/')">More at wilhelmsen.com <i class="ti ti-external-link" style="font-size:11px" aria-hidden="true"></i></button>`;
  if(tab==='specs') return `<div class="dcard"><div class="dl">Technical specifications</div><table class="stbl">${r.specs.map(s=>`<tr><td>${s[0]}</td><td>${s[1]}</td></tr>`).join('')}</table></div>`;
  if(tab==='regs') return `<div class="dcard"><div class="dl">Regulatory status</div>
    <div style="margin-bottom:8px;padding:10px 12px;background:${r.gwp>2200?'#FDEAED':r.gwp>1500?'#FFF8E1':'#E8F5E9'};border-radius:var(--r10);border:1px solid ${r.gwp>2200?'rgba(200,16,46,.2)':r.gwp>1500?'rgba(184,134,11,.2)':'rgba(21,100,50,.2)'};font-size:12px;color:${r.gwp>2200?'#C8102E':r.gwp>1500?'#B8860B':'#155D32'};line-height:1.55">
      ${r.gwp>2200?'<strong>High GWP  -  regulatory restrictions apply.</strong> This refrigerant is banned or restricted in multiple jurisdictions. Transition to lower GWP alternative strongly recommended.':r.gwp>1500?'<strong>Transitional refrigerant.</strong> Compliant in most jurisdictions currently but subject to ongoing phase-down. Plan transition to lower GWP alternative.':'<strong>Compliant with current regulations.</strong> This low GWP refrigerant is compliant with EU F-Gas, US state regulations, and Kigali Amendment requirements.'}
    </div>
    <table class="stbl">
      <tr><td>EU F-Gas Regulation</td><td>${r.gwp>2500?'Banned for new equipment':'Quota applies  -  supply constraints'}</td></tr>
      <tr><td>California SB1206</td><td>${r.gwp>2200?'Banned  -  GWP exceeds 2200':'Compliant'}</td></tr>
      <tr><td>New York NYCRR Part 494</td><td>${r.gwp>2200?'Banned  -  GWP exceeds 2200':'Compliant'}</td></tr>
      <tr><td>Kigali Amendment</td><td>${r.gwp>1?'Subject to HFC phase-down schedule':'Not subject to HFC phase-down'}</td></tr>
      <tr><td>GWP classification</td><td>${r.gwpClass}</td></tr>
    </table>
  </div>`;
  return '';
}

function swRefrig(tab, id) {
  const r = REFRIG_DB[id]; if(!r)return;
  const ap = pw.querySelector('.pg.active'); if(!ap)return;
  // Update tab button styles inline
  ap.querySelectorAll('button[onclick*="swRefrig"]').forEach(b=>{
    const isOn = b.getAttribute('onclick').includes("swRefrig('"+tab+"'");
    b.style.background = isOn ? 'rgba(255,255,255,.22)' : 'transparent';
    b.style.color = isOn ? '#fff' : 'rgba(255,255,255,.55)';
    b.style.fontWeight = isOn ? '700' : '500';
  });
  const dc = ap.querySelector('#ref-dc');
  if(dc){dc.innerHTML=refrigTab(r,tab);dc.scrollTop=0;}
}

// ── SHARED DETAIL RENDERER for welding/machine/gas products ─────────────
function weldDet(key) {
  const p = WELD_DB[key]; if(!p)return;
  const _wld=weldDetHTML(p);stk.push({id:'wld-det-'+key,html:_wld});
  rp('wld-det-'+key, _wld);
}

        <span style="font-size:9px;font-weight:600;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.15);color:#fff;text-transform:uppercase">${p.cat}</span>

    <div style="padding:10px 12px"><div class="card" style="padding:2px 0">
      ${cat.ids.map(id=>{const p=WELD_DB[id];if(!p)return'';return`
        <div class="pr" onclick="weldDet('${id}')">
          <div class="pico" style="background:${p.bg}"><i class="ti ${p.icon}" style="font-size:13px;color:${p.col}" aria-hidden="true"></i></div>

// ══════════════════════════════════════════════════════════════════════════════

// Global NBI state
let NBI = {
  imo:'', name:'', type:'', flag:'', dwt:'',
  boilerPressure:'', boilerFeedwater:'', boilerCount:'',
  coolingAl:'',
  hfo: false, distillate: false,
  hasRefrig: false, refrigType:'',
  hasCargo: false, cargoType:'',
  hasPool: false,
  ropeVessel:'', ropeDwt:'',
  weldingSize:'',
  gases: false,
  lubricants: false,
  selections: {},   // {sectionId: {products:[{p,name,brand,qty,note}], skip:bool}}
  step: 0
};

const NBI_ACCENT = '#003057';
const NBI_LIGHT  = '#E8EEF8';

// ── STEP DEFINITIONS ──────────────────────────────────────────────────────────
const NBI_STEPS = [
  {id:'vessel',    label:'Vessel Info',      icon:'ti-ship'},
  {id:'water',     label:'Water Treatment',  icon:'ti-droplet'},
  {id:'cleaning',  label:'Cleaning',         icon:'ti-spray'},
  {id:'fuel',      label:'Fuel Treatment',   icon:'ti-flame'},
  {id:'cargo',     label:'Cargo Hold',       icon:'ti-building-warehouse'},
  {id:'ropes',     label:'Mooring Ropes',    icon:'ti-git-branch'},
  {id:'welding',   label:'Welding & Gases',  icon:'ti-tool'},
  {id:'lubricants',label:'Lubricants',       icon:'ti-droplet-filled'},
  {id:'refrigerants',label:'Refrigerants',   icon:'ti-temperature'},
  {id:'review',    label:'Review & Export',  icon:'ti-file-text'},
];

function hNBI() {
  NBI = {imo:'',name:'',type:'',flag:'',dwt:'',boilerPressure:'',boilerFeedwater:'',boilerCount:'',coolingAl:'',hfo:false,distillate:false,hasRefrig:false,refrigType:'',hasCargo:false,cargoType:'',hasPool:false,ropeVessel:'',ropeDwt:'',weldingSize:'',gases:false,lubricants:false,selections:{},step:0};
  return nbiPage();
}

function nbiPage() {
  const s = NBI_STEPS[NBI.step];
  const pct = Math.round((NBI.step / (NBI_STEPS.length-1)) * 100);
  const header = `
    <div style="background:${NBI_ACCENT};padding:14px 14px 0;position:sticky;top:0;z-index:10">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <button onclick="nbiBack()" style="background:rgba(255,255,255,.12);border:none;border-radius:8px;width:30px;height:30px;display:grid;place-items:center;cursor:pointer;flex-shrink:0">
          <i class="ti ti-arrow-left" style="font-size:13px;color:#fff"></i>
        </button>
        <div style="flex:1">
          <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5)">NEW BUILDING INQUIRY — STEP ${NBI.step+1} OF ${NBI_STEPS.length}</div>
          <div style="font-size:15px;font-weight:700;color:#fff;margin-top:1px">${s.label}</div>
        </div>
        ${(NBI.name||NBI.step===0) ? `<div style="text-align:right"><div style="font-size:9px;color:rgba(255,255,255,.5)">VESSEL</div><div style="font-size:11px;font-weight:700;color:#fff">${NBI.name||'—'}</div></div>` : ''}
      </div>
      <div style="height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-bottom:0">
        <div style="height:100%;width:${pct}%;background:#4FC3F7;border-radius:2px;transition:width .4s"></div>
      </div>
      <div style="display:flex;overflow-x:auto;padding:8px 0 10px;gap:4px;-webkit-overflow-scrolling:touch">
        ${NBI_STEPS.map((st,i)=>`
          <div style="display:flex;align-items:center;gap:3px;flex-shrink:0;opacity:${i===NBI.step?'1':i<NBI.step?'0.7':'0.35'};cursor:${i<NBI.step?'pointer':'default'}" ${i<NBI.step?`onclick="NBI.step=${i};nbiRefresh()"`:''}>
            <div style="width:18px;height:18px;border-radius:50%;background:${i<NBI.step?'#4FC3F7':i===NBI.step?'#fff':'rgba(255,255,255,.2)'};display:grid;place-items:center;flex-shrink:0">
              ${i<NBI.step ? '<i class="ti ti-check" style="font-size:9px;color:#003057"></i>' : `<span style="font-size:8px;font-weight:800;color:${i===NBI.step?'#003057':'rgba(255,255,255,.5)'}">${i+1}</span>`}
            </div>
            ${i===NBI.step?`<span style="font-size:9px;font-weight:700;color:#fff;white-space:nowrap">${st.label}</span>`:''}
          </div>
          ${i<NBI_STEPS.length-1?`<div style="width:8px;height:1px;background:rgba(255,255,255,.2);flex-shrink:0;margin-top:0"></div>`:''}
        `).join('')}
      </div>
    </div>`;

  const body = nbiStepBody(NBI.step);
  return `<div style="background:var(--bg)">${header}<div style="padding:14px 14px 24px">${body}</div></div>`;
}

function nbiStepBody(step) {
  const id = NBI_STEPS[step].id;
  if(id==='vessel')     return nbiStepVessel();
  if(id==='water')      return nbiStepWater();
  if(id==='cleaning')   return nbiStepCleaning();
  if(id==='fuel')       return nbiStepFuel();
  if(id==='cargo')      return nbiStepCargo();
  if(id==='ropes')      return nbiStepRopes();
  if(id==='welding')    return nbiStepWelding();
  if(id==='lubricants') return nbiStepLubricants();
  if(id==='refrigerants') return nbiStepRefrig();
  if(id==='review')     return nbiStepReview();
  return '';
}

function nbiRefresh() {
  const html = nbiPage();
  // Update stack so goBack works
  const entry = stk[stk.length-1];
  if(entry && typeof entry==='object') entry.html = html;
  // Update in-place — no slide animation, no new DOM element
  const cur = pw.querySelector('.pg.active');
  if(cur) {
    const scrollY = cur.scrollTop;
    cur.innerHTML = html;
    cur.scrollTop = scrollY;
  } else {
    rp('nbi', html);
  }
}

function nbiBack() {
  if(NBI.step > 0) { NBI.step--; nbiRefresh(); }
  else goBack();
}

function nbiNext() {
  if(NBI.step < NBI_STEPS.length-1) { NBI.step++; nbiRefresh(); }
}

function nbiSkip() {
  const id = NBI_STEPS[NBI.step].id;
  NBI.selections[id] = {skip:true, products:[]};
  nbiNext();
}

function nbiSaveAndNext(id, products) {
  NBI.selections[id] = {skip:false, products};
  nbiNext();
}

function nbiWaterProducts() {
  const prods = [];

function nbiSendEmail() {
  // Step 1 — generate & download the PDF so the user can attach it
  nbiExportPDF();

  // Step 2 — build a full product list for the email body
  const sections = [
    {id:'water',label:'Water Treatment'},{id:'cleaning',label:'Cleaning'},
    {id:'fuel',label:'Fuel Treatment'},{id:'cargo',label:'Cargo Hold'},
    {id:'ropes',label:'Mooring Ropes'},{id:'welding',label:'Welding & Gases'},
    {id:'lubricants',label:'Lubricants'},{id:'refrigerants',label:'Refrigerants'},
  ];
  let productLines = '';
  sections.forEach(sec => {
    const s = NBI.selections[sec.id];
    if(!s || s.skip || !s.products.length) return;
    productLines += `\n${sec.label.toUpperCase()}\n`;
    s.products.forEach(p => {
      productLines += `  - ${p.name}${p.p?' (#'+p.p+')':''}${p.brand?' ['+p.brand+']':''} ${p.note?'| '+p.note:''}\n`;
    });
  });

  const subject = encodeURIComponent(`NBI Product Package — ${NBI.name} (IMO ${NBI.imo})`);
  const body = encodeURIComponent(
`Dear Omar,

Please find below the New Building product configuration for the following vessel.
The full PDF report has been downloaded — please find it attached.

VESSEL DETAILS
--------------
Vessel Name : ${NBI.name}
IMO Number  : ${NBI.imo}
Vessel Type : ${NBI.type}
Size (DWT)  : ${NBI.dwt}
Flag State  : ${NBI.flag||'—'}

PRODUCT SELECTION
-----------------${productLines}
Please review the attached PDF for the complete package and contact me to confirm quantities and pricing.

Kind regards`
  );

  // Small delay so PDF download starts before mailto opens
  setTimeout(() => {
    window.location.href = `mailto:omar.labib@wilhelmsen.com?subject=${subject}&body=${body}`;
  }, 800);
}

function wsrBody(step) {
  const id = WSR_STEPS[step].id;
  if(id==='vessel')    return wsrStepVessel();
  if(id==='boiler')    return wsrStepBoiler();
  if(id==='cooling')   return wsrStepCooling();
  if(id==='waterprod') return wsrStepWaterProd();
  if(id==='potable')   return wsrStepPotable();
  if(id==='seawater')  return wsrStepSeawater();
  if(id==='waterproof')return wsrStepWaterproof();
  if(id==='ballast')   return wsrStepBallast();
  if(id==='wastewater')return wsrStepWastewater();
  if(id==='photos')    return wsrStepPhotos();
  if(id==='rob')       return wsrStepROB();
  if(id==='comments')  return wsrStepComments();
  if(id==='signature') return wsrStepSignature();
  if(id==='preview')   return wsrStepPreview();
  return '';
}

// Status helpers
function wsrSt(val,lo,hi){if(val===''||val===null||val===undefined||isNaN(parseFloat(val)))return'na';const v=parseFloat(val);if(v<lo)return'low';if(v>hi)return'high';return'ok';}
function wsrStC(st){if(st==='ok')return{bg:'#E8F5E9',tc:'#155D32',lbl:'OK'};if(st==='low')return{bg:'#FDEAED',tc:'#C0392B',lbl:'LOW'};if(st==='high')return{bg:'#FFF3E0',tc:'#B45000',lbl:'HIGH'};return{bg:'#F0F5FA',tc:'#7A95B0',lbl:'—'};}
function wsrBadge(val,lo,hi){const c=wsrStC(wsrSt(val,lo,hi));return `<span style="font-size:8px;font-weight:700;padding:1px 6px;border-radius:5px;background:${c.bg};color:${c.tc}">${c.lbl}</span>`;}

function wsrCheckIMO(){
  const el = document.getElementById('wsr-imo');
  if(el) WSR.imo = el.value.trim();
  const hint = document.getElementById('wsr-imo-hint');
  if(!hint) return;
  const vdb = wsrLookupVessel(WSR.imo);
  if(vdb){
    hint.innerHTML = '<span style="color:#1D6FA4;font-weight:700"><i class="ti ti-check" style="vertical-align:-2px"></i> Vessel found: <b>' + vdb.name + '</b> — ' + (vdb.boilerSystems?vdb.boilerSystems.length:0) + ' boiler + ' + (vdb.coolSystems?vdb.coolSystems.length:0) + ' cooling systems pre-loaded</span>';
    const vn = document.getElementById('wsr-vessel');
    const cu = document.getElementById('wsr-customer');
    if(vn && !vn.value) { vn.value = vdb.name; WSR.vessel = vdb.name; }
    if(cu && !cu.value && vdb.customer) { cu.value = vdb.customer; WSR.customer = vdb.customer; }
    if(!WSR.type && vdb.type) { WSR.type = vdb.type; wsrRefresh(); }
  } else if(WSR.imo && WSR.imo.length >= 7){
    hint.innerHTML = '<span style="color:#6B7280">No pre-loaded configuration for this IMO — fill in the systems manually</span>';
  } else {
    hint.innerHTML = '';
  }
}

function wsrVesselNext(){
  ['vessel','imo','customer','port','date','chiefEngineer','pse'].forEach(k=>{const el=document.getElementById('wsr-'+k);if(el)WSR[k]=el.value;});
  if(!WSR.vessel||!WSR.imo)return;
  // Auto-populate from vessel database
  const vdb = wsrLookupVessel(WSR.imo);
  if(vdb){
    if(!WSR.vessel||WSR.vessel===WSR.imo) WSR.vessel = vdb.name;
    if(!WSR.type) WSR.type = vdb.type||WSR.type;
    if(!WSR.customer) WSR.customer = vdb.customer||WSR.customer;
    // Load boiler systems if not yet filled
    if(vdb.boilerSystems && WSR.boiler.length<=1 && !WSR.boiler[0]?.name){
      WSR.boiler = vdb.boilerSystems.map(s=>({...s}));
    }
    if(vdb.boilerLimits) WSR.boilerLimits = {...vdb.boilerLimits};
    if(vdb.boilerProds && !WSR.boilerProds.length) WSR.boilerProds = [...vdb.boilerProds];
    // Load cooling systems if not yet filled
    if(vdb.coolSystems && WSR.cooling.length<=1 && !WSR.cooling[0]?.name){
      WSR.cooling = vdb.coolSystems.map(s=>({...s}));
    }
    if(vdb.coolingLimits) WSR.coolingLimits = {...vdb.coolingLimits};
    if(vdb.coolProds && !WSR.coolProds.length) WSR.coolProds = [...vdb.coolProds];
  }
  wsrNext();
}

// ── DOSING CHART HELPERS ──────────────────────────────────────────────────────
function wsrAutotreeDose(pAlk){
  // Autotreat dosing chart: P-Alk 0→2.4, 50→1.8, 100→1.2, 150→0.6, 200+→0 (Blowdown)
  const chart=[[0,2.4],[50,1.8],[100,1.2],[150,0.6],[200,0],[225,0],[300,0]];
  const v=parseFloat(pAlk);
  if(isNaN(v))return null;
  if(v>=200)return 'P-Alk is ≥200 — reduce dosage to 0 and increase blowdown frequency.';
  for(let i=0;i<chart.length-1;i++){
    const [x0,y0]=[chart[i][0],chart[i][1]];
    const [x1,y1]=[chart[i+1][0],chart[i+1][1]];
    if(v>=x0&&v<x1){
      const dose=(y0+(y1-y0)*(v-x0)/(x1-x0)).toFixed(1);
      return 'Recommended Autotreat dose: '+dose+' L/m³ feed water (from dosing chart).';
    }
  }
  return null;
}

function wsrOSPDose(deha){
  const v=parseFloat(deha);
  if(isNaN(v))return null;
  if(v<0.08)return 'DEHA below 0.08 ppm — increase Oxygen Scavenger Plus dose by 25% (per dosing chart: <0.08 ppm = +25%).';
  if(v>0.30)return 'DEHA above 0.30 ppm — decrease Oxygen Scavenger Plus dose by 25% (per dosing chart: >0.30 ppm = −25%).';
  return null;
}

function wsrRocorDose(nitrite){
  // Rocor NB chart: Nitrite 0→13.0, 180→11.3, 360→9.7, 540→8.1, 720→6.5, 900→4.9, 1080→3.3, 1260→1.7, 1440-2400→0
  const chart=[[0,13.0],[180,11.3],[360,9.7],[540,8.1],[720,6.5],[900,4.9],[1080,3.3],[1260,1.7],[1440,0]];
  const v=parseFloat(nitrite);
  if(isNaN(v)||v<0)return null;
  if(v>=1440)return 'Nitrite within range — no corrective dose needed.';
  for(let i=0;i<chart.length-1;i++){
    const [x0,y0]=[chart[i][0],chart[i][1]];
    const [x1,y1]=[chart[i+1][0],chart[i+1][1]];
    if(v>=x0&&v<x1){
      const dose=(y0+(y1-y0)*(v-x0)/(x1-x0)).toFixed(1);
      return 'Recommended Rocor NB Liquid dose: '+dose+' L per 1,000 L system volume (from dosing chart).';
    }
  }
  return null;
}

function wsrCollectRecommendedChems(){
  // Build list of kits needing refills with their consumables
  const kitConsumables={}; // kitName → Set of consumable keys
  const tkKits=new Set();
  // Boiler expired
  if(WSR.boilerReagent==='No'){
    const kits=(WSR.boilerTestKitNames&&WSR.boilerTestKitNames.length)?WSR.boilerTestKitNames:['Spectrapak 310 (#739474)','DEHA Checkit Test Kit (#698948)'];
    kits.forEach(k=>{
      const key=Object.keys(WSR_CONSUMABLES).find(ck=>k.includes(ck.split(' ')[0])||ck.includes(k.split(' ')[0]));
      if(key){
        if(!kitConsumables[key])kitConsumables[key]=new Set(WSR.selectedConsumables&&WSR.selectedConsumables[key]?WSR.selectedConsumables[key]:[]);
        if(!(WSR.selectedConsumables&&WSR.selectedConsumables[key])){
          WSR_CONSUMABLES[key].forEach(c=>kitConsumables[key].add(c.p));
        }
      }
    });
  }
  // Cooling expired
  WSR.cooling.forEach(r=>{
    if(r.reagent==='No'){
      const kits=(r.testKitNames&&r.testKitNames.length)?r.testKitNames:['Spectrapak 309 (#739466)','Mortoship Nitrite Test Kit (#739414)'];
      kits.forEach(k=>{
        const key=Object.keys(WSR_CONSUMABLES).find(ck=>k.includes(ck.split(' ')[0])||ck.includes(k.split(' ')[0]));
        if(key){
          if(!kitConsumables[key])kitConsumables[key]=new Set(WSR.selectedConsumables&&WSR.selectedConsumables[key]?WSR.selectedConsumables[key]:[]);
          if(!(WSR.selectedConsumables&&WSR.selectedConsumables[key])){
            WSR_CONSUMABLES[key].forEach(c=>kitConsumables[key].add(c.p));
          }
        }
      });
    }
  });
  // GLS
  const glsNeeded=[];
  WSR.boiler.forEach(r=>{ if(r.appearance&&r.appearance!=='Clear') glsNeeded.push('Boiler — '+r.name); });
  WSR.cooling.forEach(r=>{ if(r.appearance&&r.appearance!=='Clear') glsNeeded.push('Cooling — '+r.name); });
  if(WSR.potable&&WSR.potable.discoloration) glsNeeded.push('Potable Water');
  return {kitConsumables, gls:glsNeeded};
}

    chloride:{low:'',high:'High Chloride — check for seawater/cooler leaks. Increase blowdown frequency.'},

  return (m[fld]&&m[fld][dir])||'Check system and adjust dosage.';
}

function wsrAddPhotos(input,label){
  if(!WSR.photos)WSR.photos=[];
  Array.from(input.files).forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{WSR.photos.push({data:e.target.result,label:label||file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' '),name:file.name,status:'Not Inspected',comment:''});wsrRefresh();};
    r.readAsDataURL(file);
  });
}

function wsrStepROB(){
  const allProds=wsrCollectAllProds();
  if(WSR.rob.items.length!==allProds.length){
    while(WSR.rob.items.length<allProds.length) WSR.rob.items.push({prod:'',qty:''});
  }
  if(!WSR.rob.mode) WSR.rob.mode='manual';
  return `
  <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px">ROB — Remaining on Board</div>

function wsrROBScan(){
  if(!WSR.rob.robPhoto)return;
  WSR.rob.scanning=true; WSR.rob.scanDone=false; WSR.rob.scanError=null;
  wsrRefresh();
  const b64=WSR.rob.robPhoto.split(',')[1];
  const mime=(WSR.rob.robPhoto.match(/data:([^;]+);/)||[,'image/jpeg'])[1];
  const selectedProds=wsrCollectAllProds();
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:mime,data:b64}},
      {type:'text',text:'This is a ship ROB (remaining on board) chemical inventory list. Extract ALL product names and quantities. Return ONLY a JSON array, no markdown: [{"product":"name","qty":"25L"}]. Known products: '+selectedProds.join(', ')+'. Include all visible products even if not in known list.'}
    ]}]})
  }).then(r=>r.json()).then(data=>{
    let txt=(data.content&&data.content[0]?data.content[0].text:'')||'';
    txt=txt.replace(/```json|```/g,'').trim();
    let parsed=[]; try{parsed=JSON.parse(txt);}catch(e){throw new Error('Could not parse scan result');}
    const allProds=wsrCollectAllProds(); let filled=0; let newCount=0;
    parsed.forEach(item=>{
      const pName=item.product||''; const pQty=item.qty||''; if(!pName)return;
      const matchIdx=allProds.findIndex(p=>p.toLowerCase().includes(pName.toLowerCase().substring(0,8))||pName.toLowerCase().includes(p.toLowerCase().substring(0,8)));
      if(matchIdx>=0){if(!WSR.rob.items[matchIdx])WSR.rob.items[matchIdx]={prod:allProds[matchIdx],qty:''};WSR.rob.items[matchIdx].qty=pQty;filled++;}
      else{const alreadyExtra=(WSR.rob.extraItems||[]).some(e=>e.prod.toLowerCase().includes(pName.toLowerCase().substring(0,6)));if(!alreadyExtra){if(!WSR.rob.extraItems)WSR.rob.extraItems=[];WSR.rob.extraItems.push({prod:pName,qty:pQty});newCount++;}}
    });
    WSR.rob.scanning=false; WSR.rob.scanDone=true;
    WSR.rob.scanMsg='Found '+parsed.length+' products: '+filled+' matched to report, '+newCount+' new added below';
    wsrRefresh();
  }).catch(err=>{
    WSR.rob.scanning=false;
    WSR.rob.scanError='Scan failed: '+(err.message||'Check connection and try again');
    wsrRefresh();
  });
}

function wsrCollectAllProds(){
  const all=new Set();
  (WSR.boilerProds||[]).forEach(p=>all.add(p));
  (WSR.coolProds||[]).forEach(p=>all.add(p));
  (WSR.waterprod.prods||[]).forEach(p=>all.add(p));
  (WSR.potable.prods||[]).forEach(p=>all.add(p));
  if(WSR.potable.freeText&&WSR.potable.freeText.trim())all.add(WSR.potable.freeText.trim());
  (WSR.seawater.prods||[]).forEach(p=>all.add(p));
  if(WSR.seawater.swOther&&WSR.seawater.swOther.trim())all.add(WSR.seawater.swOther.trim());
  (WSR.ballast.chemicals||[]).forEach(p=>all.add(p));
  if(WSR.ballast.ballastOther&&WSR.ballast.ballastOther.trim())all.add(WSR.ballast.ballastOther.trim());
  (WSR.wastewater&&WSR.wastewater.prods||[]).forEach(p=>all.add(p));
  if(WSR.wastewater&&WSR.wastewater.wwOther&&WSR.wastewater.wwOther.trim())all.add(WSR.wastewater.wwOther.trim());
  return [...all];
}

function wsrInitSigCanvas(id, sigKey){
  const canvas=document.getElementById(id);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#003057'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false;
  function pt(e){const r=canvas.getBoundingClientRect();const cl=e.touches?e.touches[0]:e;return{x:(cl.clientX-r.left)*(canvas.width/r.width),y:(cl.clientY-r.top)*(canvas.height/r.height)};}
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();drawing=true;const p=pt(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!drawing)return;const p=pt(e);ctx.lineTo(p.x,p.y);ctx.stroke();};
  canvas.onmouseup=canvas.ontouchend=()=>drawing=false;
}

function wsrCaptureSig(who){

function wsrClearSig(who){

function wsrSaveReport(html, meta){

  const editIdx = WSR._editingId ? (WSR_REPORTS||[]).findIndex(r=>r.id===WSR._editingId) : -1;
  const rep={id: editIdx>=0 ? WSR._editingId : Date.now(),
    date:meta.date||new Date().toISOString().split('T')[0],
    vessel:meta.vessel||'Unknown',imo:meta.imo||'—',customer:meta.customer||'—',
    port:meta.port||'—',pse:meta.pse||'—',html,wsrData:snapshot};
  if(editIdx>=0){ WSR_REPORTS[editIdx]=rep; }
  else { WSR_REPORTS.unshift(rep); }

  try{localStorage.setItem('wsr_reports',JSON.stringify(WSR_REPORTS));}catch(e){}

function wsrEditReport(id){

  WSR=JSON.parse(JSON.stringify(rep.wsrData));

function wsrMailReport(id){
  const rep=(WSR_REPORTS||[]).find(r=>r.id===id);

  const url=URL.createObjectURL(new Blob([rep.html],{type:'text/html'}));

  // Build email with instructions
  const subj=encodeURIComponent('WSS Water Service Report — '+rep.vessel+' (IMO: '+rep.imo+') — '+rep.date);
